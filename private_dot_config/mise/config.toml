[tools]
# -- Languages
node = "24"
python = "3.12"
go = "latest"
deno = "latest"
# julia = "latest"

# -- Tools
jq = "latest"
tree-sitter = "latest"
starship = "latest"
uv = "latest"
ripgrep = "latest"
lsd = "latest"
fd = "latest"
bat = "latest"
delta = "latest"
fzf = "latest"
lazygit = "latest"
gh = "latest"
"aqua:neovim/neovim" = "0.12"
usage = "latest"
ghq = "latest"
"npm:hunkdiff" = "latest"

aws-cli = "latest"
terraform = "latest"
pnpm = "latest"

# ghcup = "latest"
# tmux = "latest"  # macでビルド必要なことが多い

[settings]
idiomatic_version_file_enable_tools = []

[settings.github]
# gh CLI が macOS Keychain に保存したトークンを mise が必要時のみ取得する
# 環境変数 GITHUB_TOKEN を export しないことで他プロセスへの露出を防ぐ
credential_command = "gh auth token"
