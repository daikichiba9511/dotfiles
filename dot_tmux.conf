# ============================================================================
# TMUX Configuration
# ============================================================================

# ============================================================================
# General Settings
# ============================================================================

# Set default shell
set-option -g default-shell "${SHELL}"

# Enable 256 color and true color support
set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",$TERM:Tc"
# OSC 52 clipboard support for all terminal types
set -as terminal-overrides ',*:Ms=\E]52;%p1%s;%p2%s\007'
set-option -as terminal-features ',*:clipboard'
# Enable OSC 8 hyperlinks
set -as terminal-features ',*:hyperlinks'
set-environment -g COLORTERM "truecolor"

# Reduce escape time for better vim responsiveness
set -sg escape-time 10

# Enable clipboard support (on: tmux sends OSC 52 on copy)
set-option -g set-clipboard on
# Enable passthrough for OSC sequences (all for SSH)
set -g allow-passthrough on

# Increase history limit
set-option -g history-limit 50000


# Enable mouse support
set-option -g mouse on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

# ============================================================================
# Status Bar Configuration
# ============================================================================

# Status bar position and layout
set-option -g status-position top
set-option -g status-justify left

# Update status bar every second
set-option -g status-interval 1

# Status bar right side: wifi and battery status
set-option -g status-right "#(wifi) #(battery --tmux)"

# ============================================================================
# Key Bindings - Window and Pane Management
# ============================================================================

# Split panes using | and -
bind | split-window -h
bind - split-window -v

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing (repeatable with -r)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Claude Code split
bind a split-window -h -c "#{pane_current_path}" "claude"

# ============================================================================
# Copy Mode Configuration
# ============================================================================

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Copy mode key bindings
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi V   send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi Y   send -X copy-line

# Yank to system clipboard via OSC 52
# set-clipboard on + Ms capability により tmux が自動的に OSC 52 を送信
bind -T copy-mode-vi y     send -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send -X copy-selection-and-cancel

# Paste from buffer
bind-key C-p paste-buffer

# ============================================================================
# Theme: Rose Pine Dawn
# ============================================================================
# Palette: https://rosepinetheme.com/palette/ingredients/
# base #faf4ed | surface #fffaf3 | overlay #f2e9e1
# muted #9893a5 | subtle #797593 | text #575279
# love #b4637a | gold #ea9d34 | rose #d7827e
# pine #286983 | foam #56949f | iris #907aa9
# hl_low #f4ede8 | hl_med #dfdad9 | hl_high #cecacd

# Status bar
set-option -g status-style "bg=#f2e9e1,fg=#575279"

# Window list
# inactive: text fg で読めるコントラスト
# active: iris bg にバッジ風で一目で分かるように
set-window-option -g window-status-style "fg=#575279,bg=#f2e9e1"
set-window-option -g window-status-format " #I:#W#F "
set-window-option -g window-status-current-style "fg=#fffaf3,bg=#907aa9,bold"
set-window-option -g window-status-current-format " #I:#W#F "
set-window-option -g window-status-activity-style "fg=#b4637a,bg=#f2e9e1"

# Pane borders
set-option -g pane-border-style "fg=#9893a5"
set-option -g pane-active-border-style "fg=#907aa9"

# Copy mode selection
set-window-option -g mode-style "bg=#dfdad9,fg=#575279"

# Messages / command prompt
set-option -g message-style "bg=#f2e9e1,fg=#575279"
set-option -g message-command-style "bg=#f2e9e1,fg=#575279"

# display-panes (prefix + q)
set-option -g display-panes-colour "#9893a5"
set-option -g display-panes-active-colour "#907aa9"

# Clock mode
set-window-option -g clock-mode-colour "#56949f"
